name: SentinelleFocus
options:
  bundleIdPrefix: com.dgiego38
targets:
  SentinelleFocus:
    type: application
    platform: iOS
    deploymentTarget: "17.4"
    sources: [SentinelleFocus]
   settings:
      GENERATE_INFOPLIST_FILE: YES
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      CODE_SIGN_ENTITLEMENTS: SentinelleFocus/SentinelleFocus.entitlements # <-- Change cette ligne

  SentinelleShield:
    type: app-extension.shield-configuration
    platform: iOS
    sources: [ShieldExtension]
    settings:
      GENERATE_INFOPLIST_FILE: YES

  SentinelleLiveActivity:
    type: app-extension
    platform: iOS
    sources: [LiveActivityExtension]
    settings:
      GENERATE_INFOPLIST_FILE: YES