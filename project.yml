name: SentinellePro
options:
  bundleIdPrefix: com.dgiego38
targets:
  SentinellePro:
    type: application
    platform: iOS
    deploymentTarget: "17.4"
    sources: 
      - path: SentinelleFocus
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.dgiego38.sentinellepro
      GENERATE_INFOPLIST_FILE: YES
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      CODE_SIGN_ENTITLEMENTS: SentinelleFocus.entitlements
    dependencies:
      - target: SentinelleShield

  SentinelleShield:
    type: app-extension
    platform: iOS
    sources: 
      - path: ShieldExtension
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.dgiego38.sentinellepro.shield